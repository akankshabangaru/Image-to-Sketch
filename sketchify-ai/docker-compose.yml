version: '3.9'

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - MONGO_URI=mongodb://mongo:27017/sketchify
    ports:
      - '5000:5000'
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      - BACKEND_URL=http://backend:5000
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  mongo_data:
  backend_uploads:
